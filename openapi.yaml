openapi: 3.0.3

info:
  title: Multi currency payment API
  description: |
    RESTful API built with Laravel 12. This API manages multi-currency
    payment requests across a company with employees in different countries.
    ## Authentication
    Protected endpoints require a JWT Bearer token obtained from
    `POST /api/login` or `POST /api/register`. Pass it in the
    `Authorization` header:
    ```
    Authorization: Bearer <access_token>
    ```
  version: 1.0.0

servers:
  - url: http://localhost/api
    description: Local development server

tags:
  - name: Authentication
    description: User registration, login, and logout
  - name: Monitoring
    description: API health and status checks
  - name: Payments
    description: >
      Submit, list, detail, approve, and reject multi-currency payment requests.
      Employees manage their own requests; finance members action all requests.

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # ── Health ────────────────────────────────────────────────────────────────
  /health:
    get:
      tags:
        - Monitoring
      summary: Health Check
      description: >
        Returns the current health status of the API and its dependencies.
        Public endpoint — no authentication required.
      operationId: healthCheck
      responses:
        '200':
          description: All systems healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                timestamp: '2026-06-11T21:13:54+00:00'
                environment: local
                version: 1.0.0
                checks:
                  database:
                    status: healthy
                    message: Database connection OK
                  cache:
                    status: healthy
                    message: Cache driver OK
                  queue:
                    status: healthy
                    message: Queue driver [database] OK
                  storage:
                    status: healthy
                    message: Storage read/write OK
                  app:
                    status: healthy
                    message: Laravel 12.62.0 running
                    php_version: 8.5.7
                    memory_usage: 4 MB
        '503':
          description: One or more systems unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: unhealthy
                timestamp: '2026-06-10T15:24:00+00:00'
                environment: local
                version: 1.0.0
                checks:
                  database:
                    status: unhealthy
                    message: 'SQLSTATE[HY000] [2002] Connection refused'
                  cache:
                    status: healthy
                    message: Cache driver OK

  # ── Authentication ─────────────────────────────────────────────────────────
  /register:
    post:
      tags:
        - Authentication
      summary: User Registration
      description: >
        Creates a new user account and returns a Bearer token.
        Public endpoint — no authentication required.
        All newly registered users receive the `employee` scope.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: John Doe
              email: john@example.com
              password: SecurePassword123!
              password_confirmation: SecurePassword123!
              country: BR
              currency_code: BRL
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                message: User registered successfully.
                user:
                  id: 18
                  name: John Doe
                  email: john@example.com
                  country: BR
                  currency_code: BRL
                  department: employee
                token:
                  access_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...
                  token_type: Bearer
                  scopes:
                    - employee
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              example:
                message: The name field is required. (and 4 more errors)
                errors:
                  name:
                    - The name field is required.
                  email:
                    - The email field is required.
                  password:
                    - The password field is required.
                  country:
                    - The country field is required.
                  currency_code:
                    - The currency code field is required.

  /login:
    post:
      tags:
        - Authentication
      summary: User Login
      description: >
        Authenticates a user and returns a Bearer token.
        Public endpoint — no authentication required.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: john@example.com
              password: SecurePassword123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                message: Login successful.
                user:
                  id: 16
                  name: Finance User
                  email: finance_user@email.com
                  country: EUA
                  currency_code: USD
                  department: finance
                token:
                  access_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...
                  token_type: Bearer
                  scopes:
                    - finance
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Invalid credentials.
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              example:
                message: The email field must be a valid email address. (and 1 more error)
                errors:
                  email:
                    - The email field must be a valid email address.
                  password:
                    - The password field is required.

  /logout:
    post:
      tags:
        - Authentication
      summary: User Logout
      description: >
        Invalidates the current Bearer token and ends the user session.
        After logout the token cannot be reused — clients must discard it locally.
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Logged out successfully.
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Unauthenticated.

  # ── Payments ───────────────────────────────────────────────────────────────
  /payment:
    get:
      tags:
        - Payments
      summary: List Payment Requests
      description: |
        Returns a paginated list of payment requests (15 items per page).

        **Access rules:**
        | Role       | Visible records                                                       |
        |------------|-----------------------------------------------------------------------|
        | `employee` | Only their own requests. `employee_id` filter is silently ignored.    |
        | `finance`  | All requests. Can additionally filter by `employee_id`.               |
      operationId: listPayments
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by payment status
          schema:
            type: string
            enum:
              - pending
              - approved
              - rejected
              - expired
        - name: currency
          in: query
          required: false
          description: Filter by ISO 4217 currency code (3 letters, case-insensitive)
          schema:
            type: string
            minLength: 3
            maxLength: 3
          example: BRL
        - name: date_from
          in: query
          required: false
          description: Include requests created on or after this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
          example: '2026-06-01'
        - name: date_to
          in: query
          required: false
          description: >
            Include requests created on or before this date (YYYY-MM-DD).
            Must be ≥ `date_from`.
          schema:
            type: string
            format: date
          example: '2026-06-30'
        - name: employee_id
          in: query
          required: false
          description: Filter by employee ID — **finance role only**; silently ignored for employees
          schema:
            type: integer
          example: 7
        - name: page
          in: query
          required: false
          description: Page number (1-based, defaults to 1)
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Paginated list of payment requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
              example:
                data:
                  - id: 42
                    user_id: 7
                    description: Office supplies reimbursement
                    amount_local: 1500.00
                    currency_code: BRL
                    amount_eur: 276.75
                    exchange_rate: 5.42
                    rate_source: exchangerate-api.com
                    rate_timestamp: '2026-06-12T10:00:00+00:00'
                    status: pending
                    approved_by: null
                    approved_at: null
                    expired_at: null
                    created_at: '2026-06-12T10:00:00+00:00'
                    updated_at: '2026-06-12T10:00:00+00:00'
                links:
                  first: 'http://localhost/api/payment?page=1'
                  last: 'http://localhost/api/payment?page=2'
                  prev: null
                  next: 'http://localhost/api/payment?page=2'
                meta:
                  current_page: 1
                  from: 1
                  last_page: 2
                  per_page: 15
                  to: 15
                  total: 20
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Unauthenticated.
        '422':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              example:
                message: The status field must be one of pending, approved, rejected, expired.
                errors:
                  status:
                    - The status field must be one of pending, approved, rejected, expired.

    post:
      tags:
        - Payments
      summary: Create Payment Request
      description: |
        Submits a new payment request in the employee's local currency.

        The exchange rate (EUR → local currency) is fetched automatically from
        **exchangerate-api.com** at the time of submission and stored immutably.
        The EUR equivalent (`amount_eur`) is computed server-side.

        **Exchange rate behaviour:**
        - Rate is **cached for 1 hour** — repeated submissions within the same window reuse the cached value.
        - If the exchange rate API is unreachable, a `503` is returned and **no record is created**.
        - `user_id` is inferred from the Bearer token and cannot be set in the request body.

        **Status lifecycle:**
        ```
        [created] → pending → approved
                            → rejected
                            → expired (after 48 h with no action)
        ```

        **Access rules:** both `employee` and `finance` roles may create payment requests.
      operationId: createPayment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentStoreRequest'
            example:
              amount_local: 1500.00
              currency_code: BRL
              description: Office supplies reimbursement
      responses:
        '201':
          description: Payment request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
              example:
                data:
                  id: 42
                  user_id: 7
                  description: Office supplies reimbursement
                  amount_local: 1500.00
                  currency_code: BRL
                  amount_eur: 276.7528
                  exchange_rate: 5.42
                  rate_source: exchangerate-api.com
                  rate_timestamp: '2026-06-13T10:00:00+00:00'
                  status: pending
                  approved_by: null
                  approved_at: null
                  expired_at: null
                  created_at: '2026-06-13T10:00:00+00:00'
                  updated_at: '2026-06-13T10:00:00+00:00'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Unauthenticated.
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              example:
                message: The amount local field is required. (and 1 more error)
                errors:
                  amount_local:
                    - The amount local field is required.
                  currency_code:
                    - The currency code field is required.
        '503':
          description: Exchange rate service temporarily unavailable — no record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: Exchange rate service is temporarily unavailable. Please try again later.

  /payment/{id}:
    get:
      tags:
        - Payments
      summary: Get Payment Request
      description: |
        Returns the full details of a single payment request.

        **Access rules:**
        | Role       | Allowed                                                           |
        |------------|-------------------------------------------------------------------|
        | `employee` | Only their own requests — returns `403` for any other record.     |
        | `finance`  | Any payment request.                                              |
      operationId: getPayment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
              example:
                data:
                  id: 42
                  user_id: 7
                  description: Office supplies reimbursement
                  amount_local: 1500.00
                  currency_code: BRL
                  amount_eur: 276.75
                  exchange_rate: 5.42
                  rate_source: exchangerate-api.com
                  rate_timestamp: '2026-06-12T10:00:00+00:00'
                  status: pending
                  approved_by: null
                  approved_at: null
                  expired_at: null
                  created_at: '2026-06-12T10:00:00+00:00'
                  updated_at: '2026-06-12T10:00:00+00:00'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Unauthenticated.
        '403':
          description: Employee attempting to access another user's request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: This action is unauthorized.
        '404':
          description: Payment request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: 'No query results for model [App\Models\Payment] -1'

  /payment/{id}/approve:
    patch:
      tags:
        - Payments
      summary: Approve Payment Request
      description: |
        Marks a pending payment request as approved.

        **Access rules:** `finance` role only — employees receive `403`.

        **State rules:** only `pending` requests can be approved.

        | Current status | Result                      |
        |----------------|-----------------------------|
        | `pending`      | ✅ Approved successfully     |
        | `approved`     | ❌ `400 Bad Request`         |
        | `rejected`     | ❌ `400 Bad Request`         |
        | `expired`      | ❌ `400 Bad Request`         |

        **Fields updated on approval:**
        | Field        | Before   | After                   |
        |--------------|----------|-------------------------|
        | `status`     | pending  | approved                |
        | `approved_by`| null     | Finance user's ID       |
        | `approved_at`| null     | Current UTC timestamp   |

        The `exchange_rate`, `amount_eur`, and `rate_source` fields are immutable and never changed.
      operationId: approvePayment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment request approved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
              example:
                data:
                  id: 42
                  user_id: 7
                  description: Office supplies reimbursement
                  amount_local: 1500.00
                  currency_code: BRL
                  amount_eur: 276.75
                  exchange_rate: 5.42
                  rate_source: exchangerate-api.com
                  rate_timestamp: '2026-06-12T10:00:00+00:00'
                  status: approved
                  approved_by: 3
                  approved_at: '2026-06-13T14:22:00+00:00'
                  expired_at: null
                  created_at: '2026-06-12T10:00:00+00:00'
                  updated_at: '2026-06-13T14:22:00+00:00'
        '400':
          description: Payment is not in pending state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Only pending requests can be approved.
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Unauthenticated.
        '403':
          description: Employee attempting to approve a request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: This action is unauthorized.
        '404':
          description: Payment request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: 'No query results for model [App\Models\Payment] 99999.'

  /payment/{id}/reject:
    patch:
      tags:
        - Payments
      summary: Reject Payment Request
      description: |
        Marks a pending payment request as rejected.

        **Access rules:** `finance` role only — employees receive `403`.

        **State rules:** only `pending` requests can be rejected.

        | Current status | Result                      |
        |----------------|-----------------------------|
        | `pending`      | ✅ Rejected successfully     |
        | `approved`     | ❌ `400 Bad Request`         |
        | `rejected`     | ❌ `400 Bad Request`         |
        | `expired`      | ❌ `400 Bad Request`         |

        **Fields updated on rejection:**
        | Field        | Before   | After                   |
        |--------------|----------|-------------------------|
        | `status`     | pending  | rejected                |
        | `approved_by`| null     | Finance user's ID       |
        | `approved_at`| null     | Remains `null`          |

        Note: `approved_at` is **not** set on rejection — only `approved_by` is populated to record who actioned the request.
        The `exchange_rate`, `amount_eur`, and `rate_source` fields are immutable and never changed.
      operationId: rejectPayment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment request rejected successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
              example:
                data:
                  id: 42
                  user_id: 7
                  description: Office supplies reimbursement
                  amount_local: 1500.00
                  currency_code: BRL
                  amount_eur: 276.75
                  exchange_rate: 5.42
                  rate_source: exchangerate-api.com
                  rate_timestamp: '2026-06-12T10:00:00+00:00'
                  status: rejected
                  approved_by: 3
                  approved_at: null
                  expired_at: null
                  created_at: '2026-06-12T10:00:00+00:00'
                  updated_at: '2026-06-13T14:25:00+00:00'
        '400':
          description: Payment is not in pending state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Only pending requests can be rejected.
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Unauthenticated.
        '403':
          description: Employee attempting to reject a request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: This action is unauthorized.
        '404':
          description: Payment request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: 'No query results for model [App\Models\Payment] 999999.'

# ---------------------------------------------------------------------------
# COMPONENTS
# ---------------------------------------------------------------------------
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Reusable parameters ──────────────────────────────────────────────────
  parameters:
    PaymentId:
      name: id
      in: path
      required: true
      description: Unique integer identifier of the payment request
      schema:
        type: integer
      example: 42

  # ── Schemas ───────────────────────────────────────────────────────────────
  schemas:

    # ── Health ──────────────────────────────────────────────────────────────
    HealthCheckItem:
      type: object
      description: Status of a single API subsystem
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          description: Whether this subsystem is operational
        message:
          type: string
          description: Human-readable status message
        php_version:
          type: string
          description: PHP version — present only in the `app` check
          example: 8.5.7
        memory_usage:
          type: string
          description: Current memory consumption — present only in the `app` check
          example: 4 MB
      required:
        - status
        - message

    HealthResponse:
      type: object
      description: Overall API health status and per-subsystem breakdown
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          description: Aggregate status — `unhealthy` if any subsystem fails
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 datetime of the health check
        environment:
          type: string
          description: Current application environment
          example: local
        version:
          type: string
          description: API version
          example: 1.0.0
        checks:
          type: object
          description: Individual status of each subsystem
          additionalProperties:
            $ref: '#/components/schemas/HealthCheckItem'
      required:
        - status
        - timestamp
        - environment
        - version
        - checks

    # ── Auth ─────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: john@example.com
        password:
          type: string
          format: password
          description: User's password
          example: SecurePassword123!

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
        - password_confirmation
        - country
        - currency_code
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: User's full name
          example: John Doe
        email:
          type: string
          format: email
          description: Valid email address — must be unique across all users
          example: john@example.com
        password:
          type: string
          format: password
          minLength: 8
          description: >
            Minimum 8 characters. Must contain at least one uppercase letter,
            one lowercase letter, one number, and one special character.
          example: SecurePassword123!
        password_confirmation:
          type: string
          format: password
          description: Must match the `password` field exactly
          example: SecurePassword123!
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code
          example: BR
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 currency code
          example: BRL

    UserObject:
      type: object
      description: Authenticated user details returned on login or registration
      properties:
        id:
          type: integer
          description: Unique identifier of the user
          example: 18
        name:
          type: string
          description: User's full name
          example: John Doe
        email:
          type: string
          format: email
          description: User's email address
          example: john@example.com
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code
          example: BR
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 currency code for the user's local currency
          example: BRL
        department:
          type: string
          enum: [employee, finance]
          description: Department/role that determines API access level
          example: employee

    TokenObject:
      type: object
      description: Bearer token issued on successful authentication
      properties:
        access_token:
          type: string
          description: JWT Bearer token — include in `Authorization` header for protected requests
          example: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...
        token_type:
          type: string
          enum: [Bearer]
          description: Token scheme — always `Bearer`
          example: Bearer
        scopes:
          type: array
          description: Access scopes granted to this token
          items:
            type: string
            enum: [employee, finance]
          example:
            - employee

    AuthResponse:
      type: object
      description: Successful authentication response (login or registration)
      properties:
        message:
          type: string
          description: Human-readable status message
          example: User registered successfully.
        user:
          $ref: '#/components/schemas/UserObject'
        token:
          $ref: '#/components/schemas/TokenObject'
      required:
        - message
        - user
        - token

    # ── Payments ─────────────────────────────────────────────────────────────
    PaymentObject:
      type: object
      description: |
        A single payment request record.

        **Status derivation logic** (evaluated in order at response time):

        | Condition                | Derived `status` |
        |--------------------------|------------------|
        | `expired_at` is not null | `expired`        |
        | `approved_at` is not null| `approved`       |
        | Still pending            | `pending`        |
        | None of the above        | `rejected`       |
      properties:
        id:
          type: integer
          description: Unique identifier of the payment request
          example: 42
        user_id:
          type: integer
          description: ID of the employee who submitted the request
          example: 7
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: Human-readable reason for the payment
          example: Office supplies reimbursement
        amount_local:
          type: number
          format: float
          description: Amount in the employee's local currency
          example: 1500.00
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 code of the local currency — always uppercase
          example: BRL
        amount_eur:
          type: number
          format: float
          description: >
            EUR equivalent computed as `amount_local / exchange_rate` at creation time.
            Stored with 4 decimal places. Immutable.
          example: 276.7528
        exchange_rate:
          type: number
          format: float
          description: >
            EUR → local currency rate captured at creation time. Immutable —
            never updated even if the market rate changes. Stored with 6 decimal places.
          example: 5.42
        rate_source:
          type: string
          description: Provider that supplied the exchange rate
          example: exchangerate-api.com
        rate_timestamp:
          type: string
          format: date-time
          description: ISO 8601 datetime when the exchange rate was fetched
          example: '2026-06-12T10:00:00+00:00'
        status:
          type: string
          enum: [pending, approved, rejected, expired]
          description: Derived status — see status derivation logic above
          example: pending
        approved_by:
          type: integer
          nullable: true
          description: ID of the finance user who approved or rejected the request; null if not yet actioned
          example: null
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 datetime of approval; null if not approved (or if rejected/expired)
          example: null
        expired_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 datetime of automatic expiry (after 48 h with no action); null if not expired
          example: null
        created_at:
          type: string
          format: date-time
          description: ISO 8601 datetime when the payment request was created
          example: '2026-06-12T10:00:00+00:00'
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 datetime of the most recent update to the record
          example: '2026-06-12T10:00:00+00:00'
      required:
        - id
        - user_id
        - amount_local
        - currency_code
        - amount_eur
        - exchange_rate
        - rate_source
        - rate_timestamp
        - status
        - approved_by
        - approved_at
        - expired_at
        - created_at
        - updated_at

    PaymentResponse:
      type: object
      description: Single payment request envelope
      properties:
        data:
          $ref: '#/components/schemas/PaymentObject'
      required:
        - data

    PaymentListResponse:
      type: object
      description: Paginated list of payment requests
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PaymentObject'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
        - data
        - links
        - meta

    PaginationLinks:
      type: object
      description: Pagination navigation URLs
      properties:
        first:
          type: string
          format: uri
          description: URL of the first page
          example: 'http://localhost/api/payment?page=1'
        last:
          type: string
          format: uri
          description: URL of the last page
          example: 'http://localhost/api/payment?page=2'
        prev:
          type: string
          format: uri
          nullable: true
          description: URL of the previous page; null on the first page
          example: null
        next:
          type: string
          format: uri
          nullable: true
          description: URL of the next page; null on the last page
          example: 'http://localhost/api/payment?page=2'
      required:
        - first
        - last
        - prev
        - next

    PaginationMeta:
      type: object
      description: Pagination metadata
      properties:
        current_page:
          type: integer
          description: Current page number (1-based)
          example: 1
        from:
          type: integer
          description: 1-based index of the first item on the current page
          example: 1
        last_page:
          type: integer
          description: Total number of pages
          example: 2
        per_page:
          type: integer
          description: Maximum items per page — always 15
          example: 15
        to:
          type: integer
          description: 1-based index of the last item on the current page
          example: 15
        total:
          type: integer
          description: Total records matching the current filters across all pages
          example: 20
      required:
        - current_page
        - from
        - last_page
        - per_page
        - to
        - total

    PaymentStoreRequest:
      type: object
      required:
        - amount_local
        - currency_code
      properties:
        amount_local:
          type: number
          format: float
          description: Amount in the employee's local currency — must be greater than 0
          minimum: 0
          exclusiveMinimum: true
          maximum: 99999999999
          example: 1500.00
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Za-z]{3}$'
          description: ISO 4217 currency code — exactly 3 alpha characters; case-insensitive, stored as uppercase
          example: BRL
        description:
          type: string
          maxLength: 1000
          nullable: true
          description: Optional human-readable reason for the payment
          example: Office supplies reimbursement

    # ── Generic / Error ───────────────────────────────────────────────────────
    MessageResponse:
      type: object
      description: Simple message-only response (success or error)
      properties:
        message:
          type: string
          description: Human-readable status message
          example: Logged out successfully.
      required:
        - message

    ValidationError:
      type: object
      description: Laravel 422 validation error response
      properties:
        message:
          type: string
          description: Summary of all validation failures
          example: The email field must be a valid email address. (and 1 more error)
        errors:
          type: object
          description: Field-level map of validation error messages
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email:
              - The email field must be a valid email address.
            password:
              - The password field is required.
      required:
        - message
        - errors

    ServerError:
      type: object
      description: >
        Laravel server-side error response. Includes a stack trace when the
        application is not running in production mode.
      properties:
        message:
          type: string
          description: Human-readable error description
          example: This action is unauthorized.
        exception:
          type: string
          description: Fully-qualified exception class name
          example: 'Symfony\Component\HttpKernel\Exception\AccessDeniedHttpException'
        file:
          type: string
          description: Absolute file path where the exception was thrown
          example: /var/www/html/vendor/laravel/framework/src/Illuminate/Foundation/Exceptions/Handler.php
        line:
          type: integer
          description: Line number where the exception was thrown
          example: 672
        trace:
          type: array
          description: Stack trace — list of call-stack frames leading to the failure
          items:
            type: object
      required:
        - message
