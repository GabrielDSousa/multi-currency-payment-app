openapi: 3.1.0

info:
  title: REST API
  description: |
    RESTful API built with Laravel 12. This API manages multi-currency
    payment requests across a company with employees in different countries.

    ## Authentication
    Protected endpoints require a JWT Bearer token obtained from
    `POST /api/login` or `POST /api/register`. Pass it in the
    `Authorization` header:

    ```
    Authorization: Bearer <access_token>
    ```
  version: 1.0.0

servers:
  - url: http://localhost/api
    description: Local development server

tags:
  - name: Authentication
    description: User registration, login, and logout
  - name: Monitoring
    description: API health and status checks
  - name: Payment Requests
    description: >
      Create, list, and manage multi-currency payment requests.
      Employees see only their own requests; finance members see all.

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ── Health ────────────────────────────────────────────────────────────────
  /health:
    get:
      tags:
        - Monitoring
      summary: Health Check
      description: >
        Returns the current health status of the API and its dependencies
        (database, cache, queue, storage, and application runtime).
      operationId: getHealth
      security: []
      responses:
        '200':
          description: All systems healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                timestamp: "2026-06-11T21:13:54+00:00"
                environment: local
                version: "1.0.0"
                checks:
                  database:
                    status: healthy
                    message: "Database connection OK"
                  cache:
                    status: healthy
                    message: "Cache driver OK"
                  queue:
                    status: healthy
                    message: "Queue driver [database] OK"
                  storage:
                    status: healthy
                    message: "Storage read/write OK"
                  app:
                    status: healthy
                    message: "Laravel 12.62.0 running"
                    php_version: "8.5.7"
                    memory_usage: "4 MB"
        '503':
          description: One or more systems are unhealthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: unhealthy
                timestamp: "2026-06-10T15:24:00+00:00"
                environment: local
                version: "1.0.0"
                checks:
                  database:
                    status: unhealthy
                    message: "SQLSTATE[HY000] [2002] Connection refused"
                  cache:
                    status: healthy
                    message: "Cache driver OK"

  # ── Register ──────────────────────────────────────────────────────────────
  /register:
    post:
      tags:
        - Authentication
      summary: Register User
      description: Creates a new user account and returns a JWT authentication token.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: "John Doe"
              email: "john@example.com"
              password: "SecurePassword123!"
              password_confirmation: "SecurePassword123!"
              country: "BR"
              currency_code: "BRL"
      responses:
        '201':
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                message: "User registered successfully."
                user:
                  id: 18
                  name: "John Doe"
                  email: "john@example.com"
                  country: "BR"
                  currency_code: "BRL"
                  department: "employee"
                token:
                  access_token: "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9..."
                  token_type: "Bearer"
                  scopes:
                    - "employee"
        '422':
          description: Validation error — one or more fields are invalid or missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                message: "The name field is required. (and 4 more errors)"
                errors:
                  name:
                    - "The name field is required."
                  email:
                    - "The email field is required."
                  password:
                    - "The password field is required."
                  country:
                    - "The country field is required."
                  currency_code:
                    - "The currency code field is required."

  # ── Login ─────────────────────────────────────────────────────────────────
  /login:
    post:
      tags:
        - Authentication
      summary: Login User
      description: Authenticates a user with email and password, returning a JWT token.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "john@example.com"
              password: "SecurePassword123!"
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                message: "Login successful."
                user:
                  id: 16
                  name: "Finance User"
                  email: "finance_user@email.com"
                  country: "US"
                  currency_code: "USD"
                  department: "finance"
                token:
                  access_token: "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9..."
                  token_type: "Bearer"
                  scopes:
                    - "finance"
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Invalid credentials."
        '422':
          description: Validation error — one or more fields are invalid or missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                message: "The email field must be a valid email address. (and 1 more error)"
                errors:
                  email:
                    - "The email field must be a valid email address."
                  password:
                    - "The password field is required."

  # ── Logout ────────────────────────────────────────────────────────────────
  /logout:
    post:
      tags:
        - Authentication
      summary: Logout User
      description: >
        Revokes the current Bearer token and ends the user session.
        After a successful logout the token cannot be reused — clients
        should discard it locally.
      operationId: logoutUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Logged out successfully."
        '401':
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Unauthenticated."

  # ── Payment Requests — List ───────────────────────────────────────────────
  /payment-requests:
    get:
      tags:
        - Payment Requests
      summary: List Payment Requests
      description: >
        Returns a paginated list of payment requests (15 per page).

        **Access rules:**
        - `employee` — sees only their own requests; the `employee_id` filter is ignored.
        - `finance` — sees all requests and may further filter by `employee_id`.
      operationId: listPaymentRequests
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by derived payment status.
          schema:
            type: string
            enum:
              - pending
              - approved
              - rejected
              - expired
          example: pending
        - name: currency
          in: query
          required: false
          description: ISO 4217 currency code (3 letters). Case-insensitive.
          schema:
            type: string
            minLength: 3
            maxLength: 3
          example: BRL
        - name: date_from
          in: query
          required: false
          description: Include only requests created on or after this date (YYYY-MM-DD).
          schema:
            type: string
            format: date
          example: "2026-06-01"
        - name: date_to
          in: query
          required: false
          description: >
            Include only requests created on or before this date (YYYY-MM-DD).
            Must be equal to or after `date_from`.
          schema:
            type: string
            format: date
          example: "2026-06-30"
        - name: employee_id
          in: query
          required: false
          description: >
            Filter by employee ID. **Finance only** — ignored for employee tokens.
          schema:
            type: integer
          example: 7
        - name: page
          in: query
          required: false
          description: Page number (1-based). Defaults to `1`.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        '200':
          description: Paginated list of payment requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
              example:
                data:
                  - id: 42
                    user_id: 7
                    description: "Office supplies reimbursement"
                    amount_local: 1500.00
                    currency_code: "BRL"
                    amount_eur: 276.75
                    exchange_rate: 5.42
                    rate_source: "exchangerate-api.com"
                    rate_timestamp: "2026-06-12T10:00:00+00:00"
                    status: "pending"
                    approved_by: null
                    approved_at: null
                    expired_at: null
                    created_at: "2026-06-12T10:00:00+00:00"
                    updated_at: "2026-06-12T10:00:00+00:00"
                links:
                  first: "http://localhost/api/payment-requests?page=1"
                  last: "http://localhost/api/payment-requests?page=2"
                  prev: null
                  next: "http://localhost/api/payment-requests?page=2"
                meta:
                  current_page: 1
                  from: 1
                  last_page: 2
                  per_page: 15
                  to: 15
                  total: 20
        '401':
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Unauthenticated."
        '422':
          description: Validation error — one or more query parameters are invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                message: "The status field must be one of pending, approved, rejected, expired."
                errors:
                  status:
                    - "The status field must be one of pending, approved, rejected, expired."

  # ── Payment Requests — Detail ─────────────────────────────────────────────
  /payment-requests/{id}:
    get:
      tags:
        - Payment Requests
      summary: Get Payment Request
      description: >
        Returns the full details of a single payment request.

        **Access rules:**
        - `employee` — can only fetch their own requests; returns `403` otherwise.
        - `finance` — can fetch any request.
      operationId: getPaymentRequest
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the payment request.
          schema:
            type: integer
          example: 42
      responses:
        '200':
          description: Payment request details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentDetailResponse'
              example:
                data:
                  id: 42
                  user_id: 7
                  description: "Office supplies reimbursement"
                  amount_local: 1500.00
                  currency_code: "BRL"
                  amount_eur: 276.75
                  exchange_rate: 5.42
                  rate_source: "exchangerate-api.com"
                  rate_timestamp: "2026-06-12T10:00:00+00:00"
                  status: "pending"
                  approved_by: null
                  approved_at: null
                  expired_at: null
                  created_at: "2026-06-12T10:00:00+00:00"
                  updated_at: "2026-06-12T10:00:00+00:00"
        '401':
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Unauthenticated."
        '403':
          description: Forbidden — employee attempting to view another user's request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "This action is unauthorized."
        '404':
          description: Payment request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "No query results for model [App\\Models\\Payment] 42."

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  # ── Security Schemes ──────────────────────────────────────────────────────
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT Bearer token obtained from `POST /api/login` or
        `POST /api/register`.

  # ── Schemas ───────────────────────────────────────────────────────────────
  schemas:

    # Request bodies ─────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
        - password_confirmation
        - country
        - currency_code
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: User's full name.
          example: "John Doe"
        email:
          type: string
          format: email
          description: Valid and unique email address.
          example: "john@example.com"
        password:
          type: string
          format: password
          minLength: 8
          description: >
            Minimum 8 characters. Must contain at least one uppercase letter,
            one lowercase letter, one digit, and one special character.
          example: "SecurePassword123!"
        password_confirmation:
          type: string
          format: password
          description: Must match the `password` field.
          example: "SecurePassword123!"
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code.
          example: "BR"
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 currency code.
          example: "BRL"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User's registered email address.
          example: "john@example.com"
        password:
          type: string
          format: password
          description: User's password.
          example: "SecurePassword123!"

    # Shared objects ──────────────────────────────────────────────────────────

    UserObject:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the user.
          example: 18
        name:
          type: string
          description: User's full name.
          example: "John Doe"
        email:
          type: string
          format: email
          description: User's email address.
          example: "john@example.com"
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code.
          example: "BR"
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 currency code.
          example: "BRL"
        department:
          type: string
          enum:
            - employee
            - finance
          description: User's department / role scope.
          example: "employee"

    TokenObject:
      type: object
      properties:
        access_token:
          type: string
          description: Signed JWT Bearer token.
          example: "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9..."
        token_type:
          type: string
          enum:
            - Bearer
          description: Token type — always `Bearer`.
          example: "Bearer"
        scopes:
          type: array
          description: Permission scopes granted to this token.
          items:
            type: string
            enum:
              - employee
              - finance
          example:
            - "employee"

    HealthCheck:
      type: object
      properties:
        status:
          type: string
          enum:
            - healthy
            - unhealthy
          description: Status of this individual check.
          example: "healthy"
        message:
          type: string
          description: Human-readable status detail.
          example: "Database connection OK"
        php_version:
          type: string
          description: PHP version — present only on the `app` check.
          example: "8.5.7"
        memory_usage:
          type: string
          description: Current memory consumption — present only on the `app` check.
          example: "4 MB"

    # Response bodies ─────────────────────────────────────────────────────────

    AuthResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable status message.
          example: "Login successful."
        user:
          $ref: '#/components/schemas/UserObject'
        token:
          $ref: '#/components/schemas/TokenObject'

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable status message.
          example: "Logged out successfully."

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error description.
          example: "Invalid credentials."

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Summary of all validation failures.
          example: "The name field is required. (and 4 more errors)"
        errors:
          type: object
          description: >
            Map of field names to an array of error messages for that field.
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email:
              - "The email field must be a valid email address."
            password:
              - "The password field is required."


    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - healthy
            - unhealthy
          description: Aggregated health status of the entire API.
          example: "healthy"
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 datetime when the check was performed.
          example: "2026-06-11T21:13:54+00:00"
        environment:
          type: string
          description: Current application environment.
          example: "local"
        version:
          type: string
          description: API version.
          example: "1.0.0"
        checks:
          type: object
          description: Individual health status per subsystem.
          properties:
            database:
              $ref: '#/components/schemas/HealthCheck'
            cache:
              $ref: '#/components/schemas/HealthCheck'
            queue:
              $ref: '#/components/schemas/HealthCheck'
            storage:
              $ref: '#/components/schemas/HealthCheck'
            app:
              $ref: '#/components/schemas/HealthCheck'

    PaymentObject:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the payment request.
          example: 42
        user_id:
          type: integer
          description: ID of the employee who submitted the request.
          example: 7
        description:
          type: string
          description: Human-readable reason for the payment.
          example: "Office supplies reimbursement"
        amount_local:
          type: number
          format: float
          description: Amount in the employee's local currency.
          example: 1500.00
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 code of the local currency.
          example: "BRL"
        amount_eur:
          type: number
          format: float
          description: Equivalent amount in EUR, calculated at creation time.
          example: 276.75
        exchange_rate:
          type: number
          format: float
          description: >
            EUR → local currency rate captured at creation time.
            This value is immutable — it never changes after the request is created.
          example: 5.42
        rate_source:
          type: string
          description: Provider that supplied the exchange rate.
          example: "exchangerate-api.com"
        rate_timestamp:
          type: string
          format: date-time
          description: ISO 8601 datetime when the exchange rate was fetched.
          example: "2026-06-12T10:00:00+00:00"
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
            - expired
          description: >
            Derived status of the request.
            - `pending` — awaiting finance review.
            - `approved` — approved by a finance member.
            - `rejected` — rejected by a finance member.
            - `expired` — pending for more than 48 hours without action.
          example: "pending"
        approved_by:
          type: integer
          nullable: true
          description: ID of the finance user who approved or rejected the request. `null` if not yet actioned.
          example: null
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: Datetime the request was approved. `null` if not approved.
          example: null
        expired_at:
          type: string
          format: date-time
          nullable: true
          description: Datetime the request was automatically expired. `null` if not expired.
          example: null
        created_at:
          type: string
          format: date-time
          description: ISO 8601 datetime when the request was created.
          example: "2026-06-12T10:00:00+00:00"
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 datetime of the last update.
          example: "2026-06-12T10:00:00+00:00"

    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          format: uri
          description: URL of the first page.
          example: "http://localhost/api/payment-requests?page=1"
        last:
          type: string
          format: uri
          description: URL of the last page.
          example: "http://localhost/api/payment-requests?page=2"
        prev:
          type: string
          format: uri
          nullable: true
          description: URL of the previous page, or `null` on the first page.
          example: null
        next:
          type: string
          format: uri
          nullable: true
          description: URL of the next page, or `null` on the last page.
          example: "http://localhost/api/payment-requests?page=2"

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          description: The current page number.
          example: 1
        from:
          type: integer
          description: Index of the first item on this page (1-based).
          example: 1
        last_page:
          type: integer
          description: Total number of pages.
          example: 2
        per_page:
          type: integer
          description: Number of items per page. Always `15`.
          example: 15
        to:
          type: integer
          description: Index of the last item on this page (1-based).
          example: 15
        total:
          type: integer
          description: Total number of records matching the current filters.
          example: 20

    PaymentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PaymentObject'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaymentDetailResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PaymentObject'
